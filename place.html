<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Page</title>
    <meta name="description" content="WDD 131 – Dynamic Web Fundamentals - David Jukes - Place page">
    <meta name="author" content="David Jukes">
    <link rel="stylesheet" href="styles/place.css">
    <script defer src="scripts/getdates.js"></script>
    <script defer src="scripts/place.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Roboto&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Dallas, Texas, USA</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/dallas-bridge-large.webp" media="(min-width: 1000px)">
                <source srcset="images/dallas-bridge-medium.webp" media="(min-width: 600px)">
                <img src="images/dallas-bridge-small.webp" alt="Dallas, TX" width="500" height="250">
            </picture>
        </div>
        <div class="card data">
            <h2>Data</h2>
            <span class="label">Area: </span><span class="value"> Value</span>
            <span class="label">Population: </span><span class="value"> Value</span>
            <span class="label">Capital: </span><span class="value"> Value</span>
            <span class="label">Languages: </span><span class="value"> Value</span>
            <span class="label">Time Zone: </span><span class="value"> Value</span>
            <span class="label">Calling Code: </span><span class="value"> Value</span>
            <span class="label">Internet TLD: </span><span class="value"> Value</span>
        </div>

        <div class="card weather">
            <h2>Weather</h2>
            <img id="icon-svg" src="images/weather-color-sun-cloud-svgrepo-com.svg" alt="partly cloudy">
            <span class="label">Temperature: </span> <span id="temp" class="value"></span>
            <span class="label">Conditions: </span> <span id="cond" class="value">Value</span>
            <span class="label">Wind: </span> <span id="wind" class="value">Value</span>
            <span class="label">Wind Chill: </span> <span id="wind-chill" class="value"></span>
        </div>
    </main>

    <footer>
        <p><span id="currentyear"></span> 🇺🇸 David Jukes 🇺🇸 Texas, USA</p>
        <!-- year should be displayed as the copyright symbol then just year -->
        <p id="lastModified"></p>
        <!-- last modified should be in this format: 05/30/2025 13:52:42 -->
    </footer>
</body>

</html>
